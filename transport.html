<div>
            <img src="fragilehighvaluetransportation.png" alt="Transport" style="width:100%; border-radius:15px;">
        </div>
    </div>
</section>

<section class="content-section" style="background: #0a0a0a; border-top: 1px solid #222;">
    <div style="max-width: 800px; margin: auto;">
        <h2 style="text-align: center; border-left: none; padding-left: 0; margin-bottom: 40px;">Estimateur de Budget Rapide</h2>
        
        <div style="background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; border-bottom: 4px solid #ff0000;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div>
                    <label style="display:block; margin-bottom:10px; color:#888;">Poids estimé (kg)</label>
                    <input type="number" id="poids" placeholder="Ex: 1500" style="width:100%; padding:12px; background:#222; border:1fr solid #444; color:#fff; border-radius:5px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:10px; color:#888;">Type de Bien</label>
                    <select id="type" style="width:100%; padding:12px; background:#222; border:1fr solid #444; color:#fff; border-radius:5px;">
                        <option value="1.0">Standard (Caisse)</option>
                        <option value="1.3">Fragile / Haute Valeur</option>
                        <option value="1.6">Machinerie Lourde</option>
                    </select>
                </div>
            </div>

            <button onclick="genererEstimation()" style="width:100%; padding:18px; background:#ff0000; color:#fff; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:16px; transition:0.3s;">
                CALCULER L'ESTIMATION
            </button>

            <div id="resultat" style="display:none; margin-top:30px; text-align:center; padding:20px; border:1px dashed #ff0000; border-radius:10px;">
                <p style="margin:0; color:#888;">Coût approximatif du transport :</p>
                <div id="prixAffiche" style="font-size:32px; color:#ff0000; font-weight:bold; margin:10px 0;">0.00 $</div>
                <p style="font-size:12px; color:#666;">*Cette estimation automatique ne remplace pas une soumission officielle.</p>
                
                <a id="mailLink" href="#" style="display:inline-block; margin-top:15px; color:#fff; text-decoration:underline; font-size:14px;">
                    <i class="fas fa-envelope"></i> M'envoyer cette estimation par courriel
                </a>
            </div>
        </div>
    </div>
</section>

<script>
function genererEstimation() {
    const poids = parseFloat(document.getElementById('poids').value);
    const m = parseFloat(document.getElementById('type').value);
    
    if(!poids || poids <= 0) { alert("Veuillez entrer un poids."); return; }

    // Logique de prix dégressif
    let tarif = 2.50;
    if (poids > 2000) tarif = 2.10;
    if (poids > 5000) tarif = 1.85;

    let total = (poids * tarif) * m;
    let fmt = total.toLocaleString('fr-CA', { style: 'currency', currency: 'CAD' });

    document.getElementById('prixAffiche').innerText = fmt;
    document.getElementById('resultat').style.display = 'block';

    const s = encodeURIComponent("Estimation Transport - Signature Moving");
    const b = encodeURIComponent("Détails de l'estimation :\n- Poids : " + poids + " kg\n- Prix estimé : " + fmt);
    document.getElementById('mailLink').href = "mailto:?subject=" + s + "&body=" + b;
}
</script>
