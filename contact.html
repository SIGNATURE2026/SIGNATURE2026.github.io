<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact | Signature Moving</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn { background: #c0392b; color: white; padding: 15px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h1>Contactez-nous</h1>
    <p>Nous desservons la région d'Ottawa et Gatineau. Envoyez-nous vos détails pour une estimation rapide.</p>
    <form action="mailto:info@signaturemovingcrating.ca" method="post" enctype="text/plain">
        <label>Nom de l'entreprise :</label><input type="text" name="entreprise">
        <label>Téléphone :</label><input type="tel" name="tel">
        <label>Type de service :</label>
        <select name="service"><option>Manutention</option><option>Caissage</option><option>Transport</option></select>
        <label>Détails du projet (poids, dimensions, lieu) :</label><textarea name="details"></textarea>
        <button type="submit" class="btn">Envoyer la demande</button>
    </form>
</body>
</html>
